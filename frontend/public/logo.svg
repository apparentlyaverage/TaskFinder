<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- ReLivR brand mark, native to the owner's reference: two plump leaves —
       orchid left, ink right — each with a single curved vein slit (evenodd
       cutout), the ink leaf's base sweeping into a tail that hooks down-left
       under the orchid leaf. Leaf paths are drawn base-at-origin so the loader
       can spring each leaf from its base. Keep in sync with LogoMark in App.jsx. -->
  <g>
    <!-- orchid leaf: base lower-right, tip up-left -->
    <g transform="translate(222 292) rotate(-29) scale(0.78)">
      <path fill="#c084fc" fill-rule="evenodd" d="
        M0,0 C-50,-34 -72,-84 -71,-124 C-70,-186 -38,-226 0,-246 C38,-226 70,-186 71,-124 C72,-84 50,-34 0,0 Z
        M-2,-26 C-14,-78 -12,-158 2,-214 L8,-206 C-3,-156 -4,-84 5,-26 Z" />
    </g>
    <!-- ink leaf: base lower-left, tip up-right -->
    <g transform="translate(262 322) rotate(29)">
      <path fill="#131118" fill-rule="evenodd" d="
        M0,0 C-50,-34 -72,-84 -71,-124 C-70,-186 -38,-226 0,-246 C38,-226 70,-186 71,-124 C72,-84 50,-34 0,0 Z
        M-2,-26 C-14,-78 -12,-158 2,-214 L8,-206 C-3,-156 -4,-84 5,-26 Z" />
    </g>
    <!-- the ink leaf's tail: a tapering swoosh hooking down-left under the orchid leaf -->
    <path fill="#131118" d="M264,316 C258,354 238,380 182,396 C224,368 246,344 252,312 Z" />
  </g>
</svg>
