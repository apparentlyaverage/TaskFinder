<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- ReLivR brand mark: a seedling — two leaves on one stem (the poster and
       the earner, one campus economy). Ovate leaves with midrib + side-vein
       cutouts (evenodd) so the mark reads "leaf" at any size and works on any
       surface. Leaf paths are drawn base-at-origin so the loader can grow them
       from the stem. Keep in sync with LogoMark in App.jsx. -->
  <g>
    <!-- stems -->
    <path d="M256,452 C252,406 234,366 202,334" fill="none" stroke="#131118" stroke-width="14" stroke-linecap="round"/>
    <path d="M256,452 C260,402 282,358 316,322" fill="none" stroke="#131118" stroke-width="14" stroke-linecap="round"/>
    <!-- left leaf (orchid), tip up-left -->
    <g transform="translate(200 336) rotate(-32) scale(0.78)">
      <path fill="#c084fc" fill-rule="evenodd" d="
        M0,0 C-44,-12 -64,-52 -63,-102 C-62,-168 -28,-220 0,-242 C28,-220 62,-168 63,-102 C64,-52 44,-12 0,0 Z
        M-2,-14 C-7,-72 -5,-152 2,-224 L7,-215 C2,-152 1,-74 4,-14 Z
        M-2,-84 L-32,-110 L-29,-115 L-1,-92 Z
        M2,-140 L28,-166 L25,-171 L1,-148 Z" />
    </g>
    <!-- right leaf (ink), larger, tip up-right -->
    <g transform="translate(314 324) rotate(28)">
      <path fill="#131118" fill-rule="evenodd" d="
        M0,0 C-44,-12 -64,-52 -63,-102 C-62,-168 -28,-220 0,-242 C28,-220 62,-168 63,-102 C64,-52 44,-12 0,0 Z
        M-2,-14 C-7,-72 -5,-152 2,-224 L7,-215 C2,-152 1,-74 4,-14 Z
        M-2,-84 L-32,-110 L-29,-115 L-1,-92 Z
        M2,-140 L28,-166 L25,-171 L1,-148 Z" />
    </g>
  </g>
</svg>
