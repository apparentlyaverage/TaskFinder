version: '3.9'

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - taskfinder-internal
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy

services:

  postgres:
    image: postgres:16-alpine
    container_name: taskfinder-postgres
    restart: unless-stopped
    networks:
      - taskfinder-internal
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: taskfinder-redis
    restart: unless-stopped
    networks:
      - taskfinder-internal
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: taskfinder-rabbitmq
    restart: unless-stopped
    networks:
      - taskfinder-internal
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    ports:
      - "5672:5672"
      - "15672:15672"

  gateway:
    <<: *service-defaults
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: taskfinder-gateway
    env_file: .env
    environment:
      NODE_ENV: production
      GATEWAY_PORT: 8080
      AUTH_SERVICE_URL:      http://auth:3001
      TASKS_SERVICE_URL:     http://tasks:3002
      PAYMENTS_SERVICE_URL:  http://payments:3003
      MESSAGING_SERVICE_URL: http://messaging:3004
      MATCHING_SERVICE_URL:  http://matching:3005
      REVIEWS_SERVICE_URL:   http://reviews:3006
      DISPUTES_SERVICE_URL:  http://disputes:3007
    ports:
      - "8080:8080"
    depends_on:
      - auth
      - tasks
      - payments
      - messaging
      - matching
      - reviews
      - disputes

  auth:
    <<: *service-defaults
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: taskfinder-auth
    env_file: .env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    expose:
      - "3001"

  tasks:
    <<: *service-defaults
    build:
      context: ./services/tasks
      dockerfile: Dockerfile
    container_name: taskfinder-tasks
    env_file: .env
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    expose:
      - "3002"

  payments:
    <<: *service-defaults
    build:
      context: ./services/payments
      dockerfile: Dockerfile
    container_name: taskfinder-payments
    env_file: .env
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    expose:
      - "3003"

  messaging:
    <<: *service-defaults
    build:
      context: ./services/messaging
      dockerfile: Dockerfile
    container_name: taskfinder-messaging
    env_file: .env
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379
    expose:
      - "3004"

  matching:
    <<: *service-defaults
    build:
      context: ./services/matching
      dockerfile: Dockerfile
    container_name: taskfinder-matching
    env_file: .env
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    expose:
      - "3005"

  reviews:
    <<: *service-defaults
    build:
      context: ./services/reviews
      dockerfile: Dockerfile
    container_name: taskfinder-reviews
    env_file: .env
    environment:
      PORT: 3006
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    expose:
      - "3006"

  disputes:
    <<: *service-defaults
    build:
      context: ./services/disputes
      dockerfile: Dockerfile
    container_name: taskfinder-disputes
    env_file: .env
    environment:
      PORT: 3007
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      PAYMENTS_SERVICE_URL: http://payments:3003
    expose:
      - "3007"

  scheduler:
    <<: *service-defaults
    build:
      context: ./services/jobs
      dockerfile: Dockerfile
    container_name: taskfinder-scheduler
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:

networks:
  taskfinder-internal:
    driver: bridge