# ReLivR — MVP stack. The backend is the single Express monolith in ./server.
# The former gateway + 7 microservices (auth/tasks/payments/messaging/matching/
# reviews/disputes) and the Redis/RabbitMQ infra they needed have been RETIRED
# (archived under ./legacy). The monolith talks to Postgres only.
#
# In production the database is Neon; this Postgres service is for local/VPS dev
# and loads the schema from ./db/init on first boot.

services:

  postgres:
    image: postgres:16-alpine
    container_name: relivr-postgres
    restart: unless-stopped
    networks:
      - relivr-internal
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: relivr-server
    restart: unless-stopped
    networks:
      - relivr-internal
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      # Point at the in-network Postgres, overriding any DATABASE_URL in .env
      # (which may target Neon for non-Docker runs).
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

volumes:
  postgres-data:

networks:
  relivr-internal:
    driver: bridge
